<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" width="100%" height="100%">
    <defs>
        <!-- Gradients for Folder Back flap -->
        <linearGradient id="folderBack" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#73bdf6" />
            <stop offset="100%" stop-color="#499aeb" />
        </linearGradient>
        
        <!-- Gradients for Folder Front flap -->
        <linearGradient id="folderFront" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#8fd2ff" />
            <stop offset="100%" stop-color="#5eb3fb" />
        </linearGradient>
        
        <!-- Inner shadow effect for the front flap -->
        <filter id="folderShadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#005a9e" flood-opacity="0.3" />
        </filter>
    </defs>
    
    <!-- 1. Folder Back Flap (Includes the tab shape) -->
    <path d="M 5,10 C 2,10 0,12 0,15 L 0,75 C 0,78 2,80 5,80 L 95,80 C 98,80 100,78 100,75 L 100,25 C 100,22 98,20 95,20 L 45,20 L 35,10 Z" fill="url(#folderBack)" />
    
    <!-- 2. Inside Document/Paper peek (Shows a white file peeking out) -->
    <rect x="10" y="16" width="80" height="40" fill="#f8f9fa" rx="2" />
    
    <!-- 3. Folder Front Flap -->
    <path d="M 0,28 C 0,26 2,24 5,24 L 95,24 C 98,24 100,26 100,28 L 100,75 C 100,78 98,80 95,80 L 5,80 C 2,80 0,78 0,75 Z" fill="url(#folderFront)" filter="url(#folderShadow)" />
</svg>
